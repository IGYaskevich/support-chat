services:
  - type: web
    name: support-mvp-fastapi
    env: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PORT
        value: 8080
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TWILIO_VALIDATE_SIGNATURE
        value: true
      - key: STATE_FILE
        value: ./data/state.json
      - key: MAX_TOOL_ITERATIONS
        value: 3
      - key: OPENAI_API_KEY
        sync: false
      - key: FAQ_VECTOR_STORE_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ISSUE_TRACKER_URL
        sync: false
      - key: ISSUE_TRACKER_TOKEN
        sync: false
